name: tests
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m pytest
      - run: ruff check stock_explorer tests app.py
      - run: python -m mypy stock_explorer app.py
      - run: python -m py_compile app.py stock_explorer/app_runtime.py stock_explorer/legacy_app.py
