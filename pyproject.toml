[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --disable-warnings --maxfail=1"

[tool.ruff]
line-length = 110
target-version = "py311"
extend-exclude = ["stock_explorer/legacy_app.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = true
exclude = ["stock_explorer/legacy_app.py"]
# NumPy 2.5 uses modern type-alias syntax in its bundled .pyi files.
# Respect follow_imports="skip" for stubs so a Python-3.11 target does not
# fail while parsing third-party NumPy annotations. Project modules remain checked.
follow_imports_for_stubs = true

[[tool.mypy.overrides]]
module = ["numpy", "numpy.*"]
follow_imports = "skip"

[[tool.mypy.overrides]]
module = "stock_explorer.legacy_app"
follow_imports = "skip"
