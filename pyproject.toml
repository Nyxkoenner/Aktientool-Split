[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --disable-warnings --maxfail=1"

[tool.ruff]
line-length = 110
target-version = "py313"
extend-exclude = ["stock_explorer/legacy_app.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = true
exclude = ["stock_explorer/legacy_app.py"]

[[tool.mypy.overrides]]
module = "stock_explorer.legacy_app"
follow_imports = "skip"
